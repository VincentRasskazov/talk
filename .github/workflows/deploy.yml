name: Auto-Deploy Talk Chat

on:
  push:
    branches:
      - master
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js with Cache
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'  # <-- THIS IS THE MAGIC SPEED UP LINE

      - name: Fast Install Dependencies
        run: npm ci     # <-- Much faster than 'npm install'

      - name: Build the App
        run: |
          echo "REACT_APP_BUILD_DATE=\"$(date)\"" > .env
          export NODE_OPTIONS=--openssl-legacy-provider
          npm run build
        env:
          CI: false

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
